version: 2

sources:

  - name: postgres # name of the source 
    schema: postgres  # this is the schema our raw data lives in
    database: DB38_BRONZE_DB # this is the name of our database
    quoting:
      database: false
      schema: false
      identifier: false
      
    config:
      freshness:
       warn_after: {count: 24, period: hour}
       error_after: {count: 48, period: hour}
    
    tables:

      - name: addresses
        
        config:
          loaded_at_field: _fivetran_synced
        
        columns:
          - name: ADDRESS_ID
          - name: ZIPCODE
          - name: COUNTRY
          - name: ADDRESS
          - name: STATE
          - name: FIVETRAN_DELETED
          - name: _FIVETRAN_SYNCED

      - name: ORDERITEMS
        
        config:
          loaded_at_field: _fivetran_synced
        
        columns:
          - name: ORDER_ID
          - name: PRODUCT_ID
          - name: QUANTITY
          - name: _FIVETRAN_DELETED
          - name: _FIVETRAN_SYNCED
          
      - name: ORDERS
        
        config:
          loaded_at_field: _fivetran_synced
        
        columns:
          - name: ORDER_ID
          - name: SHIPPING_SERVICE
          - name: SHIPPING_COST
          - name: ADDRESS_ID
          - name: CREATED_AT
          - name: PROMO_ID
          - name: ESTIMATED_DELIVERY_AT
          - name: ORDER_COST
          - name: USER_ID
          - name: ORDER_TOTAL
          - name: DELIVERED_AT
          - name: TRACKING_ID
          - name: STATUS
          - name: _FIVETRAN_DELETED
          - name: _FIVETRAN_SYNCED
     
      - name: PRODUCTS
        
        config:
          loaded_at_field: _fivetran_synced
        
        columns:
          - name: PRODUCT_ID
          - name: PRICE
          - name: NAME
          - name: INVENTORY
          - name: _FIVETRAN_DELETED
          - name: _FIVETRAN_SYNCED

      - name: PROMOS
        
        config:
          loaded_at_field: _fivetran_synced
        
        columns:
          - name: PROMO_ID
          - name: DISCOUNT
          - name: STATUS
          - name: _FIVETRAN_DELETED
          - name: _FIVETRAN_SYNCED

      - name: USER
        
        config:
          loaded_at_field: _fivetran_synced
        
        columns:
          - name: USER_ID
          - name: UPDATED_AT
          - name: ADDRESS_ID
          - name: LAST_NAME
          - name: CREATED_AT
          - name: PHONE_NUMBER
          - name: TOTAL_ORDERS
          - name: FIRST_NAME
          - name: EMAIL
          - name: _FIVETRAN_DELETED
          - name: _FIVETRAN_SYNCED

